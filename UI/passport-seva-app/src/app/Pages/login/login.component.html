<div class="login-container">
  <h2>Passport Login</h2>
  
  <form [formGroup]="LoginForm" (ngSubmit)="onLogin()">
    
    <div class="form-group">
      <label for="loginId">Login ID *</label>
      <input id="loginId" type="text" formControlName="LoginID" class="form-control">

      <div *ngIf="LoginForm.get('LoginID')?.hasError('required') && LoginForm.get('LoginID')?.touched"
           class="error-msg">
        Login ID is required.
      </div>
    </div>

    <div class="form-group">
      <label for="password">Password *</label>
      <input id="password" type="password" formControlName="Password" class="form-control">

      <div *ngIf="LoginForm.get('Password')?.hasError('required') && LoginForm.get('Password')?.touched"
           class="error-msg">
        Password is required.
      </div>
    </div>

    <div class="button-group">
      <button type="button" class="btn btn-secondary" (click)="LoginForm.reset()">
        Clear
      </button>

      <button type="submit" class="btn btn-primary" [disabled]="LoginForm.invalid">
        Login
      </button>
    </div>

    <div class="register-link">
      <p>New User? <a routerLink="/register">Register Now</a></p>
    </div>

  </form>
</div>
